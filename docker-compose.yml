services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_URL: http://attendance.angonolgu.local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-attendance_manager_api}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    volumes:
      - ./:/var/www/html
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
    networks:
      - attendance-network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: attendance-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - attendance-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.attendance.rule=Host(`attendance.angonolgu.local`)"
      - "traefik.http.routers.attendance.entrypoints=web"
      - "traefik.http.services.attendance.loadbalancer.server.port=80"
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: attendance-db
    restart: unless-stopped
    tty: true
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-attendance_manager_api}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - attendance-db-data:/var/lib/postgresql/data
    networks:
      - attendance-network

  redis:
    image: redis:alpine
    container_name: attendance-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - attendance-redis-data:/data
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  attendance-db-data:
    driver: local
  attendance-redis-data:
    driver: local
