services:
  # 1. The Main API Application
  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.attendance.rule=Host(`attendance.angonolgu.local`)" 
      - "traefik.http.services.attendance.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

  # 2. The Background Queue Worker
  queue:
    build:
      context: .
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - default

  # 3. Redis
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - default

  # 4. Database (PostgreSQL)
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-attendance_manager_api}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  redis-data:
  postgres-data:

networks:
  dokploy-network:
    external: true