info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/login"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "test@example.com",
        "password": "password"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const { token } = res.getBody()

        if (token) {
          bru.setEnvVar('token', token)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
